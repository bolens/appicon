name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: check-fast
        run: make check-fast

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8

      - name: gitleaks
        run: bash scripts/ci/check-gitleaks.sh

      - name: actionlint
        run: bash scripts/ci/check-actionlint.sh

      - name: markdownlint
        run: bash scripts/ci/check-markdownlint.sh
