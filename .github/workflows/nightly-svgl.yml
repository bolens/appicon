name: Nightly SVGL smoke

# Live resolve against api.svgl.app — not required to merge.
# Runs on a schedule and on manual dispatch.

on:
  schedule:
    - cron: "17 6 * * *" # 06:17 UTC daily
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  svgl-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: "1.25.x"

      - name: Build
        run: make build

      - name: Live resolve (known titles)
        run: bash scripts/ci/nightly-svgl-smoke.sh
