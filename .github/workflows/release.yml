name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Build
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME}"
          mkdir -p dist
          for pair in amd64 arm64; do
            out="dist/appicon_${ver}_linux_${pair}"
            mkdir -p "${out}"
            GOOS=linux GOARCH="${pair}" CGO_ENABLED=0 \
              go build -ldflags "-X github.com/bolens/appicon/internal/version.Version=${ver}" \
              -o "${out}/appicon" ./cmd/appicon
            tar -C "${out}" -czf "dist/appicon_${ver}_linux_${pair}.tar.gz" appicon
            rm -rf "${out}"
          done
          (cd dist && sha256sum *.tar.gz > SHA256SUMS)

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
          generate_release_notes: true
