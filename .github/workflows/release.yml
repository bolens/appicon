name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write # cosign keyless OIDC + attestations
  attestations: write
  actions: read # await CI runs for this commit
  checks: read

jobs:
  await-ci:
    name: Await CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Require successful CI on this commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "Waiting for workflow CI to succeed on ${{ github.sha }}"
          # Up to ~45 minutes (90 * 30s). Prefer a green run; fail fast on red.
          for _ in $(seq 1 90); do
            set +e
            bash scripts/ci/await-ci-success.sh "${{ github.repository }}" "${{ github.sha }}"
            rc=$?
            set -e
            if [ "$rc" -eq 0 ]; then
              exit 0
            fi
            if [ "$rc" -eq 1 ]; then
              exit 1
            fi
            sleep 30
          done
          echo "FAIL: timed out waiting for CI success on ${{ github.sha }}" >&2
          exit 1

  release:
    name: Build and publish
    needs: await-ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"

      - name: Build
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME}"
          mkdir -p dist
          for pair in amd64 arm64; do
            out="dist/appicon_${ver}_linux_${pair}"
            mkdir -p "${out}"
            GOOS=linux GOARCH="${pair}" CGO_ENABLED=0 \
              go build -ldflags "-X github.com/bolens/appicon/internal/version.Version=${ver}" \
              -o "${out}/appicon" ./cmd/appicon
            mkdir -p "${out}/completions" "${out}/man/man1" "${out}/contrib/systemd"
            cp internal/completion/appicon.bash "${out}/completions/"
            cp internal/completion/appicon.zsh "${out}/completions/"
            cp internal/completion/appicon.fish "${out}/completions/"
            cp internal/completion/appicon.1 "${out}/man/man1/"
            cp contrib/systemd/appicon.service contrib/systemd/appicon.socket contrib/systemd/README.md \
              "${out}/contrib/systemd/"
            tar -C "${out}" -czf "dist/appicon_${ver}_linux_${pair}.tar.gz" appicon completions man contrib
            rm -rf "${out}"
          done
          (cd dist && sha256sum ./*.tar.gz > SHA256SUMS)

      - name: Install cosign
        uses: sigstore/cosign-installer@v4

      - name: Sign SHA256SUMS (keyless)
        run: |
          set -euo pipefail
          cosign sign-blob --yes \
            --bundle dist/SHA256SUMS.sigstore.json \
            dist/SHA256SUMS

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/*.tar.gz
            dist/SHA256SUMS
            dist/SHA256SUMS.sigstore.json

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
            dist/SHA256SUMS.sigstore.json
          generate_release_notes: true
