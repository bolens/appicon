name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write # cosign keyless OIDC

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Build
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME}"
          mkdir -p dist
          for pair in amd64 arm64; do
            out="dist/appicon_${ver}_linux_${pair}"
            mkdir -p "${out}"
            GOOS=linux GOARCH="${pair}" CGO_ENABLED=0 \
              go build -ldflags "-X github.com/bolens/appicon/internal/version.Version=${ver}" \
              -o "${out}/appicon" ./cmd/appicon
            mkdir -p "${out}/completions" "${out}/man/man1" "${out}/contrib/systemd"
            cp internal/completion/appicon.bash "${out}/completions/"
            cp internal/completion/appicon.zsh "${out}/completions/"
            cp internal/completion/appicon.fish "${out}/completions/"
            cp internal/completion/appicon.1 "${out}/man/man1/"
            cp contrib/systemd/appicon.service contrib/systemd/appicon.socket contrib/systemd/README.md \
              "${out}/contrib/systemd/"
            tar -C "${out}" -czf "dist/appicon_${ver}_linux_${pair}.tar.gz" appicon completions man contrib
            rm -rf "${out}"
          done
          (cd dist && sha256sum ./*.tar.gz > SHA256SUMS)

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign SHA256SUMS (keyless)
        run: |
          set -euo pipefail
          cosign sign-blob --yes \
            --bundle dist/SHA256SUMS.sigstore.json \
            dist/SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
            dist/SHA256SUMS.sigstore.json
          generate_release_notes: true
